<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade1</title>
</head>
<body>
    <header></header>
    <main>
        <container>
            <form action="sucesso.html">
                <fieldset>
                    <div class="row">
                        <div>
                            <h1>Pagina de Contato</h1>
                        </div>
                        <div>
                            <label for>Nome:</label>
                            <input type="text" placeholder="seu nome">
                        </div>
                        <div>
                            <label for="">E-mail:</label>
                            <input type="text" placeholder="seu email">
                        </div>
                        <div>
                            <label for="">Telefone:</label>
                            <input type="text" placeholder="seu telefone">
                        </div>
                        <div>
                            <label for="">Data:</label>
                            <input type="date">
                        </div>
                        <div>
                            <label for="assunto">Do que se trata o contato?</label>
                            <select name="assunto" id="assunto">
                                <option value="p">Melhorias</option>
                                <option value="d">Dúvidas</option>
                            </select>
                        </div>
                        <div>
                            <label for="">Assunto:</label>
                            <input type="text">
                        </div>
                        <div>
                            <label for="">Mensagem:</label>
                            <p><textarea rows="4" cols="100"></textarea></p>
                        </div>
                    </div>
                    <div>
                        <button type="submit">Enviar Mensagem</button>
                    </div>
                    <div>
                        <button type="reset" class="btn btn-primary">Limpar Formulário</button>
                    </div>
                </fieldset>
            </form>
        </container>
    </main>
    <footer></footer>
</body>
</html>
